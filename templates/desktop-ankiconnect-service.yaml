{{- $ankiConnect := index .Values "anki-connect" -}}
{{- if and $ankiConnect.enabled $ankiConnect.ankiConnect.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $ankiConnect.name }}-ankiconnect
  labels:
    app: {{ $ankiConnect.name }}
    app.kubernetes.io/name: {{ $ankiConnect.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ $ankiConnect.ankiConnect.serviceType | default "ClusterIP" }}
  selector:
    app: {{ $ankiConnect.name }}
    app.kubernetes.io/name: {{ $ankiConnect.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ $ankiConnect.ankiConnect.servicePort | default 8765 }}
      targetPort: {{ $ankiConnect.ankiConnect.servicePort | default 8765 }}
{{- end }}
