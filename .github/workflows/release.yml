name: Release

on:
  push:
    branches:
      - main
    paths:
      - "Chart.yaml"
      - "Chart.lock"
      - "values.yaml"
      - "templates/**"
      - "docker/**"
      - ".github/workflows/**"

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: anki-sync
            dockerfile: docker/anki-sync.Dockerfile
          - image: anki-connect
            dockerfile: docker/anki-connect.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

  chart:
    runs-on: ubuntu-latest
    needs: images
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.repository_owner }}" --password-stdin

      - name: Build dependencies
        run: helm dependency build .

      - name: Package and push chart
        run: |
          helm package .
          helm push anki-stack-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
